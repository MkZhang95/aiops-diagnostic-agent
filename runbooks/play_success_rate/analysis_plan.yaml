# 播放成功率 — 统一采集计划
# 所有场景需要的分析步骤在此统一定义（已去重）
# 各场景规则文件通过引用 step id 从 Evidence Pool 取结果

metric: play_success_rate
display_name: "播放成功率"

# 父指标公式（供 decompose_formula 使用）
formula:
  description: "play_success_rate ≈ cdn_success_rate × decode_success_rate × network_success_rate"
  sub_metrics: [cdn_success_rate, decode_success_rate, network_success_rate]

steps:
  # ======== 整体趋势 ========
  - id: overall_trend
    name: "查看播放成功率整体趋势"
    priority: must
    action: query_metric
    params:
      metric: play_success_rate
    depends_on: []
    used_by: [cdn_fault, isp_fault, client_bug, network_issue]
    description: "查询播放成功率时序数据，确认是否真的存在异常下降"

  # ======== 关联指标查询（与整体趋势无依赖，可并发） ========
  - id: check_cdn_error
    name: "查询CDN错误率"
    priority: must
    action: query_metric
    params:
      metric: cdn_error_rate
    depends_on: []
    used_by: [cdn_fault]
    description: "查询CDN错误率趋势，判断是否存在CDN侧异常"

  - id: check_player_error
    name: "查询播放器错误率"
    priority: must
    action: query_metric
    params:
      metric: player_error_rate
    depends_on: []
    used_by: [client_bug]
    description: "查询播放器错误率，判断是否存在客户端侧异常"

  - id: check_network_quality
    name: "查询网络质量指标"
    priority: should
    action: query_metric
    params:
      metric: network_quality
    depends_on: []
    used_by: [network_issue, isp_fault]
    description: "查询网络质量指标，辅助判断是否为网络侧问题"

  - id: check_changes
    name: "查询变更事件"
    priority: must
    action: query_events
    params: {}
    depends_on: []
    used_by: [cdn_fault, isp_fault, client_bug, network_issue]
    description: "检查时间窗口内是否有相关变更（发版、配置变更、CDN切换等）"

  # ======== 维度下钻（依赖整体趋势确认异常后执行） ========
  - id: drill_isp
    name: "按运营商维度下钻"
    priority: must
    action: query_metric
    params:
      metric: play_success_rate
      dimension: isp
    depends_on: [overall_trend]
    used_by: [cdn_fault, isp_fault, network_issue]
    description: "按运营商维度拆解播放成功率，查看问题是否集中在某个运营商"

  - id: drill_region
    name: "按地区维度下钻"
    priority: must
    action: query_metric
    params:
      metric: play_success_rate
      dimension: region
    depends_on: [overall_trend]
    used_by: [cdn_fault, isp_fault, network_issue]
    description: "按地区维度拆解播放成功率，查看问题是否集中在某个地区"

  - id: drill_app_version
    name: "按客户端版本下钻"
    priority: must
    action: query_metric
    params:
      metric: play_success_rate
      dimension: app_version
    depends_on: [overall_trend]
    used_by: [client_bug]
    description: "按APP版本维度拆解，查看问题是否集中在某个版本"

  - id: drill_os
    name: "按操作系统下钻"
    priority: should
    action: query_metric
    params:
      metric: play_success_rate
      dimension: os
    depends_on: [overall_trend]
    used_by: [client_bug]
    description: "按操作系统维度拆解，辅助判断是否与特定平台相关"

  # ======== 维度分解（GINI + 结构贡献度一次算完） ========
  - id: gini_isp
    name: "运营商维度分解(结构贡献+GINI)"
    priority: must
    action: decompose_metric
    params:
      metric: play_success_rate
      dimension: isp
    depends_on: [drill_isp]
    used_by: [cdn_fault, isp_fault]
    description: "按运营商分解播放成功率变化：结构贡献度 + GINI 集中度"

  - id: gini_region
    name: "地区维度分解(结构贡献+GINI)"
    priority: must
    action: decompose_metric
    params:
      metric: play_success_rate
      dimension: region
    depends_on: [drill_region]
    used_by: [cdn_fault, network_issue]
    description: "按地区分解播放成功率变化：结构贡献度 + GINI 集中度"

  # ======== 公式级拆解（LMDI，乘法指标） ========
  - id: formula_decompose
    name: "公式级 LMDI 拆解"
    priority: should
    action: decompose_formula
    params:
      metric: play_success_rate
      sub_metrics: "cdn_success_rate,decode_success_rate,network_success_rate"
    depends_on: [overall_trend]
    used_by: [cdn_fault, client_bug, network_issue]
    description: "用 LMDI 定位播放成功率变化主要由哪个子链路（CDN/解码/网络）贡献"

  # ======== 相关性分析 ========
  - id: correlate_metrics
    name: "关联指标相关性"
    priority: should
    action: analyze_correlation
    params:
      base_metric: play_success_rate
      related_metrics: "cdn_error_rate,player_error_rate,network_quality"
    depends_on: [overall_trend]
    used_by: [cdn_fault, client_bug, network_issue]
    description: "计算基础指标与关联指标的皮尔逊相关性，找出同步异动最强的关联指标"

  # ======== 事件命中匹配 ========
  - id: match_change_events
    name: "匹配发布/变更事件"
    priority: should
    action: match_events
    params:
      keywords: "发版,release,deploy,上线,灰度"
    depends_on: []
    used_by: [cdn_fault, isp_fault, client_bug, network_issue]
    description: "在异常窗口命中发版/变更事件，辅助判定是否由发版引发"

  # ======== 日志查询 ========
  - id: search_error_logs
    name: "查询错误日志"
    priority: should
    action: query_logs
    params:
      keyword: "error"
      level: "ERROR"
    depends_on: []
    used_by: [cdn_fault, client_bug]
    description: "搜索相关错误日志，寻找具体报错信息辅助定位"
